<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasterX - Планировщик производства</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Дополнительные стили для навигации и отчетов */
        .sites-navigation {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .sites-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .site-link {
            padding: 10px 20px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s;
            font-weight: 500;
        }

        .site-link:hover {
            background: #007bff;
            color: white;
            border-color: #007bff;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,123,255,0.2);
        }

        .btn-info {
            background: #17a2b8;
            color: white;
            margin: 10px 0;
        }

        .btn-info:hover {
            background: #138496;
        }

        .materials-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .materials-table th,
        .materials-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }

        .materials-table th {
            background: #007bff;
            color: white;
        }

        .materials-table tfoot {
            font-weight: bold;
            background: #f8f9fa;
        }

        .order-stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            color: white;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .search-box {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            width: 300px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-box:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }

        .filter-section {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .color-preview {
            width: 20px;
            height: 20px;
            display: inline-block;
            margin-left: 5px;
            border-radius: 3px;
            border: 1px solid #ddd;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🏭 MasterX Планировщик производства</h1>
                <p style="color: #666; margin-top: 5px;">Управление заказами и производственными участками</p>
            </div>
            <button class="btn btn-primary" onclick="openOrderModal()">
                <span style="font-size: 20px; margin-right: 5px;">+</span> Новый заказ
            </button>
        </header>

        <!-- Навигация по участкам -->
        <div class="sites-navigation">
            <h3 style="margin-bottom: 15px; color: #333;">Производственные участки:</h3>
            <div class="sites-links">
                <a href="sites/tokarniy.html" class="site-link" target="_blank">🔧 Токарный</a>
                <a href="sites/slesarniy.html" class="site-link" target="_blank">🔨 Слесарный</a>
                <a href="sites/frezerniy.html" class="site-link" target="_blank">⚙️ Фрезерный</a>
                <a href="sites/lazerno-gibochniy.html" class="site-link" target="_blank">✨ Лазерно-гибочный</a>
                <a href="sites/polimerniy.html" class="site-link" target="_blank">🧪 Полимерный</a>
            </div>
        </div>

        <!-- Статистика -->
        <div class="order-stats" id="orderStats">
            <div class="stat-item">
                <div class="stat-value" id="totalOrders">0</div>
                <div class="stat-label">Всего заказов</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalItems">0</div>
                <div class="stat-label">Изделий</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="activeTasks">0</div>
                <div class="stat-label">В работе</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="completedTasks">0</div>
                <div class="stat-label">Выполнено</div>
            </div>
        </div>

        <!-- Фильтры и поиск -->
        <div class="filter-section">
            <input type="text" class="search-box" placeholder="🔍 Поиск по номеру заказа или изделию..." id="searchInput">
            <select id="statusFilter" class="search-box" style="width: auto;">
                <option value="all">Все статусы</option>
                <option value="active">Активные</option>
                <option value="completed">Завершенные</option>
            </select>
            <button class="btn btn-primary" onclick="exportOrders()">📥 Экспорт заказов</button>
        </div>

        <!-- Модальное окно создания заказа -->
        <div id="orderModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeOrderModal()">&times;</span>
                <h2>📋 Создание нового заказа</h2>
                <form id="orderForm">
                    <div class="form-group">
                        <label>📅 Дата заказа:</label>
                        <input type="date" id="orderDate" required>
                    </div>
                    <div class="form-group">
                        <label>🔢 Номер заказа:</label>
                        <input type="text" id="orderNumber" placeholder="Например: З-2024-001" required>
                    </div>
                    <div class="form-group">
                        <label>🏷️ Изделие:</label>
                        <select id="productSelect" onchange="loadProductSizes()" required>
                            <option value="">Выберите изделие</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>📏 Размер/Имя:</label>
                        <select id="sizeSelect" required>
                            <option value="">Сначала выберите изделие</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>🔢 Кол-во штук:</label>
                        <input type="number" id="quantity" min="1" value="1" required>
                    </div>
                    <div class="form-group">
                        <label>🔧 Тип кронштейна:</label>
                        <select id="bracketSelect" required>
                            <option value="">Выберите кронштейн</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>🎸 Тип лиры:</label>
                        <select id="lyreSelect" required>
                            <option value="">Выберите лиру</option>
                        </select>
                    </div>
                    
                    <!-- НОВЫЕ ПОЛЯ: ЦВЕТ RAL И ТЕКСТУРА -->
                    <div class="form-group">
    <label>🎨 Цвет RAL (вручную):</label>
    <input type="text" id="ralInput" placeholder="Например: RAL 9003">
</div>
                    <div class="form-group">
                        <label>🧵 Текстура:</label>
                        <select id="textureSelect">
                            <option value="">Выберите текстуру</option>
                            <option value="матовая">Матовая</option>
                            <option value="глянцевая">Глянцевая</option>
                            <option value="сатиновая">Сатиновая</option>
                            <option value="структурированная">Структурированная</option>
                            <option value="антик">Антик</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>📝 Дополнительные детали:</label>
                        <textarea id="additionalDetails" rows="3" placeholder="Особые требования или примечания..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-success" style="width: 100%; padding: 12px;">✅ Создать заказ</button>
                </form>
            </div>
        </div>

        <!-- Модальное окно материалов -->
        <div id="materialsModal" class="modal">
            <div class="modal-content" style="max-width: 900px;">
                <span class="close" onclick="closeMaterialsModal()">&times;</span>
                <div id="materialsReport"></div>
            </div>
        </div>

        <!-- Список заказов -->
        <div id="ordersList" class="orders-list">
            <!-- Заказы будут загружаться сюда -->
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/data-loader.js"></script>
    <script src="js/materials-report.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
